<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F6EF7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818CF8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background square with rounded corners -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="#0A0A0F" stroke="url(#grad)" stroke-width="1.5"/>

  <!-- Grid lines decoration (subtle) -->
  <line x1="2" y1="21" x2="62" y2="21" stroke="#4F6EF7" stroke-width="0.3" stroke-opacity="0.2"/>
  <line x1="2" y1="43" x2="62" y2="43" stroke="#4F6EF7" stroke-width="0.3" stroke-opacity="0.2"/>
  <line x1="21" y1="2" x2="21" y2="62" stroke="#4F6EF7" stroke-width="0.3" stroke-opacity="0.2"/>
  <line x1="43" y1="2" x2="43" y2="62" stroke="#4F6EF7" stroke-width="0.3" stroke-opacity="0.2"/>

  <!-- Letters E R S stacked vertically, centered -->
  <!-- E -->
  <text x="32" y="24" 
        font-family="monospace, 'Courier New'" 
        font-size="14" 
        font-weight="700" 
        fill="url(#grad)" 
        text-anchor="middle" 
        filter="url(#glow)"
        letter-spacing="1">E</text>
  <!-- R -->
  <text x="32" y="38" 
        font-family="monospace, 'Courier New'" 
        font-size="14" 
        font-weight="700" 
        fill="#E2E8F0" 
        text-anchor="middle"
        letter-spacing="1">R</text>
  <!-- S -->
  <text x="32" y="52" 
        font-family="monospace, 'Courier New'" 
        font-size="14" 
        font-weight="700" 
        fill="url(#grad)" 
        text-anchor="middle" 
        filter="url(#glow)"
        letter-spacing="1">S</text>

  <!-- Corner accent dots -->
  <circle cx="10" cy="10" r="1.5" fill="#4F6EF7" opacity="0.6"/>
  <circle cx="54" cy="10" r="1.5" fill="#4F6EF7" opacity="0.6"/>
  <circle cx="10" cy="54" r="1.5" fill="#4F6EF7" opacity="0.6"/>
  <circle cx="54" cy="54" r="1.5" fill="#4F6EF7" opacity="0.6"/>
</svg>